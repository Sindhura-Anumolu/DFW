      { id:"P-007", initials:"KG", name:"K. Garcia",    lastVisit:"Aug 2024", daysOverdue:183, openTx:"Root canal (est. $1,400)",      insuranceRenewal:"May 2026", annualValue:2100, tier:1, lapsRisk:83 },

    // ── Icons ─────────────────────────────────────────────────────────────────
    const Ico = {

      alert:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,

      users:    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
      lock:     <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
      cloud:    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg>,

      dollar:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
    };

    // ── Animated Counter ──────────────────────────────────────────────────────
    function AnimatedNum({ value, prefix="", suffix="" }) {
      const [n, setN] = useState(0);
      useEffect(() => {
        let cur = 0;
        const step = value / 60;
        const t = setInterval(() => {
          cur += step;
          if (cur >= value) { setN(value); clearInterval(t); }
          else setN(Math.floor(cur));
        }, 16);
        return () => clearInterval(t);
      }, [value]);
      return React.createElement('span', null, prefix + n.toLocaleString() + suffix);
    }

    // ── Badges ────────────────────────────────────────────────────────────────
    function PrivateBadge() {
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:4,background:"#DBEAFE",color:"#1E40AF",border:"1px solid #BFDBFE",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>
          <span style={{color:"#1E40AF"}}>{Ico.lock}</span> PRIVATE AI
        </span>
      );
    }
    function PublicBadge() {
      return (
        <span style={{display:"inline-flex",alignItems:"center",gap:4,background:"#DCFCE7",color:"#166534",border:"1px solid #BBF7D0",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>
          <span style={{color:"#166534"}}>{Ico.cloud}</span> PUBLIC AI
        </span>
      );
    }

    // ── Risk Badge ────────────────────────────────────────────────────────────
    function RiskBadge({ risk, score }) {
      const cfg = {
        high:   { bg:"#FEE2E2", color:"#991B1B", border:"#FECACA", label:"HIGH RISK",  action:"📞 Call now" },
        medium: { bg:"#FEF9C3", color:"#854D0E", border:"#FDE68A", label:"MEDIUM",      action:"💬 Text reminder" },
        low:    { bg:"#DCFCE7", color:"#166534", border:"#BBF7D0", label:"LOW",         action:"✓ No action" },
      }[risk];
      return (
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`,borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,letterSpacing:"0.04em",fontFamily:"monospace"}}>
            {cfg.label} {score}%
          </span>
          <span style={{fontSize:12,color:"#64748B"}}>{cfg.action}</span>
        </div>
      );
    }

    // ── HIPAA Notice ──────────────────────────────────────────────────────────
    function HipaaNotice({ text }) {
      return (
        <div style={{marginTop:12,padding:"10px 16px",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,fontSize:12,color:"#1E40AF",display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:"#1E40AF",flexShrink:0}}>{Ico.lock}</span> {text}
        </div>
      );
    }

    // ── Appeal Generator ──────────────────────────────────────────────────────
    function AppealGenerator({ claim }) {
      const [loading, setLoading] = useState(false);
      const [appeal, setAppeal] = useState(null);

      const generate = async () => {
        setLoading(true); setAppeal(null);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:"You are a dental billing specialist. Generate a concise professional insurance appeal letter under 200 words. Use [PRACTICE NAME], [PATIENT ID], [DATE OF SERVICE] as placeholders — no real PHI. Professional tone.",
              messages:[{role:"user",content:`Appeal letter for: Procedure: ${claim.procedure}, Carrier: ${claim.carrier}, Denial reason: ${claim.issue}. Placeholders only.`}]
            })
          });
          const data = await res.json();
          setAppeal(data.content?.[0]?.text || "Unable to generate. Please try again.");
        } catch {
          setAppeal("⚠ API unavailable in this environment.\n\nSample output:\n\n[PRACTICE NAME]\n[Date]\n\nRe: Appeal for Claim [CLAIM ID] — [PATIENT ID]\n\nDear Claims Review Department,\n\nWe are writing to formally appeal the denial of the above-referenced claim and respectfully request reconsideration based on the following...");
        }
        setLoading(false);
      };

      return (
        <div style={{marginTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <PublicBadge />
            <span style={{fontSize:12,color:"#64748B"}}>De-identified prompt only — no PHI sent to API</span>
          </div>
          <button onClick={generate} disabled={loading} style={{
            background:loading?"#E2E8F0":"#1E3A5F",color:loading?"#94A3B8":"#fff",
            border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:600,
            cursor:loading?"not-allowed":"pointer",transition:"all 0.2s",boxShadow:loading?"none":"0 2px 8px rgba(30,58,95,0.25)"
          }}>
            {loading ? "⏳ Generating..." : "✍ Generate Appeal Draft"}
          </button>
          {appeal && (
            <div style={{marginTop:12,background:"#FAFAFA",border:"1px solid #E2E8F0",borderRadius:10,padding:18,fontSize:13,lineHeight:1.75,color:"#374151",fontFamily:"Georgia,serif",whiteSpace:"pre-wrap",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.04)"}}>
              {appeal}
            </div>
          )}
        </div>
      );
    }

                  <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:700,color:claim.status==="flag"?"#B45309":"#166534"}}>
                    <span style={{color:claim.status==="flag"?"#D97706":"#16A34A"}}>{claim.status==="flag"?Ico.alert:Ico.check}</span>

                  </div>
                  {claim.status==="flag" && <span style={{color:"#94A3B8",fontSize:14}}>{expanded===claim.id?"▲":"▼"}</span>}

                {claim.status==="flag" && expanded===claim.id && (

                      <div style={{fontSize:13,color:"#374151"}}>{claim.issue}</div>
                    </div>
                    <div style={{marginTop:16}}>
                      <div style={{fontSize:12,fontWeight:700,marginBottom:8,color:"#94A3B8",letterSpacing:"0.05em"}}>APPEAL LETTER GENERATOR</div>
                      <AppealGenerator claim={claim} />
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
          <HipaaNotice text="Billing validation runs on DFW Technology private infrastructure · Appeal drafts use Public AI with de-identified CDT codes only — no PHI sent to API" />
        </div>
      );
    }

            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
            {[
              { label:"Tier 1 — Personal Call",   color:"#1D4ED8", bg:"#EFF6FF", border:"#BFDBFE", action:"📞 Dentist or hygienist calls this week", count:t1 },
              { label:"Tier 2 — Text Message",     color:"#B45309", bg:"#FFFBEB", border:"#FDE68A", action:"💬 Automated text with booking link",     count:t2 },

            ].map((t,i) => (
              <div key={i} style={{background:t.bg,border:`1px solid ${t.border}`,borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                <div style={{fontSize:12,fontWeight:700,color:t.color,marginBottom:6}}>{t.label}</div>
                <div style={{fontSize:30,fontWeight:800,color:t.color,marginBottom:4}}>{t.count} <span style={{fontSize:14,fontWeight:400,color:"#64748B"}}>patients</span></div>
                <div style={{fontSize:12,color:"#64748B"}}>{t.action}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:14,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>

              </div>
              {sorted.map((p,i) => (
                <div key={p.id} style={{
                  display:"grid",gridTemplateColumns:"36px 1fr 90px 90px 1fr 110px 110px 120px",
                  padding:"13px 20px",alignItems:"center",gap:8,
                  borderTop:i===0?"none":"1px solid #F1F5F9",
                  background:"#fff",transition:"background 0.15s"
                }}>
                  <div style={{
                    width:30,height:30,borderRadius:"50%",
                    background:p.tier===1?"#DBEAFE":p.tier===2?"#FEF9C3":"#DCFCE7",
                    color:p.tier===1?"#1D4ED8":p.tier===2?"#92400E":"#166534",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800
                  }}>{p.initials}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:"#0F172A"}}>{p.name}</div>
                    <div style={{fontSize:11,color:"#94A3B8"}}>Tier {p.tier} — {p.tier===1?"Priority call":p.tier===2?"Text":"Email"}</div>
                  </div>
                  <span style={{fontSize:12,color:"#64748B"}}>{p.lastVisit}</span>
                  <span style={{fontSize:12,fontWeight:700,color:p.daysOverdue>180?"#DC2626":"#D97706"}}>{p.daysOverdue}d</span>
                  <span style={{fontSize:12,color:p.openTx?"#1D4ED8":"#CBD5E1"}}>{p.openTx||"—"}</span>
                  <span style={{fontSize:12,color:"#64748B"}}>{p.insuranceRenewal}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#166534"}}>${p.annualValue.toLocaleString()}</span>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{flex:1,height:5,background:"#F1F5F9",borderRadius:3,overflow:"hidden"}}>
                      <div style={{width:`${p.lapsRisk}%`,height:"100%",background:p.lapsRisk>75?"#EF4444":p.lapsRisk>45?"#F59E0B":"#22C55E",borderRadius:3,transition:"width 1s ease"}} />
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:p.lapsRisk>75?"#DC2626":p.lapsRisk>45?"#D97706":"#16A34A",minWidth:34}}>{p.lapsRisk}%</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <HipaaNotice text="Patient recall data processed on DFW Technology HIPAA-compliant infrastructure · No patient records transmitted to external APIs" />
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("noshows");
      const [ready, setReady] = useState(false);
      useEffect(() => { setTimeout(() => setReady(true), 100); }, []);

      const highRisk  = APPOINTMENTS.filter(a=>a.risk==="high").length;
      const flagged   = CLAIMS.filter(c=>c.status==="flag").length;
      const tier1     = RECALL.filter(p=>p.tier===1).length;
      const recallVal = RECALL.filter(p=>p.tier===1).reduce((s,p)=>s+p.annualValue,0);

      const TABS = [
        { id:"noshows", label:"No-Show Risk",    icon:Ico.activity, badge:highRisk, bc:"#DC2626", tc:"#fff" },
        { id:"claims",  label:"Claim Validator", icon:Ico.shield,   badge:flagged,  bc:"#D97706", tc:"#fff" },
        { id:"recall",  label:"Recall Priority", icon:Ico.users,    badge:tier1,    bc:"#2563EB", tc:"#fff" },
      ];

      const KPIS = [
        { label:"High-Risk Appointments Today",  value:highRisk,  suffix:" slots",   color:"#DC2626", bg:"#FEF2F2", border:"#FECACA", icon:Ico.alert,    sub:"Personal call recommended" },
        { label:"Claims Flagged Pre-Submission", value:flagged,   suffix:" claims",  color:"#D97706", bg:"#FFFBEB", border:"#FDE68A", icon:Ico.shield,   sub:`$${CLAIMS.filter(c=>c.status==="flag").reduce((s,c)=>s+c.fee,0).toLocaleString()} at risk` },
        { label:"Priority Recall Patients",      value:tier1,     suffix:" patients",color:"#2563EB", bg:"#EFF6FF", border:"#BFDBFE", icon:Ico.users,    sub:"Tier 1 — call this week" },
        { label:"Recall Revenue at Stake",       value:recallVal, prefix:"$",suffix:"",color:"#166534",bg:"#F0FDF4",border:"#BBF7D0",icon:Ico.dollar,  sub:"Tier 1 patients only" },
      ];

      return (
        <div style={{minHeight:"100vh",background:"#F0F4F8",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#0F172A"}}>

          {/* Header */}
          <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"0 32px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
            <div style={{maxWidth:1140,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:66,flexWrap:"wrap",gap:12}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,background:"linear-gradient(135deg,#2563EB,#1D4ED8)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",boxShadow:"0 2px 8px rgba(37,99,235,0.35)"}}>
                  {Ico.tooth}
                </div>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:"#0F172A",letterSpacing:"-0.01em"}}>DFW Technology</div>
                  <div style={{fontSize:11,color:"#94A3B8",letterSpacing:"0.06em",fontWeight:600}}>PRIVATE AI LAB · DENTAL PRACTICE SUITE</div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:20,padding:"5px 14px"}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:"#22C55E",animation:"pulse 2s infinite"}} />
                  <span style={{fontSize:12,color:"#166534",fontWeight:700}}>HIPAA Compliant · BAA Active</span>
                </div>
                <div style={{fontSize:12,color:"#94A3B8",fontWeight:500}}>Canyon Creek Family Dentistry</div>
              </div>
            </div>
          </div>

          <div style={{maxWidth:1140,margin:"0 auto",padding:"28px 32px"}}>

            {/* KPIs */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:28}}>
              {KPIS.map((k,i) => (
                <div key={i} style={{
                  background:"#fff",border:`1px solid ${k.border}`,
                  borderRadius:14,padding:"20px 22px",
                  boxShadow:`0 2px 8px ${k.border}40`,
                  opacity:ready?1:0,transform:ready?"translateY(0)":"translateY(10px)",
                  transition:`all 0.4s ease ${i*0.08}s`
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div style={{fontSize:11,color:"#64748B",lineHeight:1.45,maxWidth:135,fontWeight:500}}>{k.label}</div>
                    <div style={{width:32,height:32,borderRadius:8,background:k.bg,display:"flex",alignItems:"center",justifyContent:"center",color:k.color,flexShrink:0}}>
                      {k.icon}
                    </div>
                  </div>
                  <div style={{fontSize:30,fontWeight:800,color:k.color,letterSpacing:"-0.02em"}}>
                    {ready ? <AnimatedNum value={k.value} prefix={k.prefix||""} suffix={k.suffix} /> : "—"}
                  </div>
                  <div style={{fontSize:11,color:"#94A3B8",marginTop:5,fontWeight:500}}>{k.sub}</div>
                </div>
              ))}
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:6,marginBottom:22,flexWrap:"wrap"}}>
              {TABS.map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  display:"flex",alignItems:"center",gap:8,
                  background:tab===t.id?"#1E3A5F":"#fff",
                  border:tab===t.id?"1px solid #1E3A5F":"1px solid #E2E8F0",
                  color:tab===t.id?"#fff":"#475569",
                  borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:600,
                  cursor:"pointer",transition:"all 0.2s",
                  boxShadow:tab===t.id?"0 2px 8px rgba(30,58,95,0.3)":"0 1px 2px rgba(0,0,0,0.05)"
                }}>
                  <span style={{color:tab===t.id?"#93C5FD":"#94A3B8"}}>{t.icon}</span>
                  {t.label}
                  <span style={{background:t.bc,color:t.tc,borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700,minWidth:20,textAlign:"center"}}>{t.badge}</span>
                </button>
              ))}
            </div>

            {/* Content */}
            <div style={{animation:"fadeUp 0.25s ease"}}>
              {tab==="noshows" && <NoShowTab />}
              {tab==="claims"  && <ClaimsTab />}
              {tab==="recall"  && <RecallTab />}
            </div>

            {/* Footer */}
            <div style={{marginTop:36,paddingTop:20,borderTop:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:11,color:"#CBD5E1"}}>DFW Technology Private AI Lab · 1201 International Pkwy, Richardson TX 75081 · HIPAA-eligible AWS infrastructure · BAA on file</div>
              <div style={{fontSize:11,color:"#CBD5E1"}}>UTD Analytics Practicum · BUAN 6390.502.26S · Spring 2026</div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
